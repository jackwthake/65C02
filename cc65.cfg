MEMORY {
  ZP: start = $00,  size = $100, type = rw, define = yes;
  STACK: start = $100,  size = $100, type = rw, define = yes;
  RAM: start = $200,  size = $5E00, type = rw, define = yes;
  ROM: start = $8000,  size = $8000, type = ro, define = yes;
}

SEGMENTS {
  ZEROPAGE: load = ZP, type = zp;
  STARTUP: load = ROM, type = ro;
  CODE: load = ROM, type = ro;
  RODATA: load = ROM, type = ro;
  ONCE: load = ROM, type = ro;
  DATA: load = ROM, run = RAM, type = rw, define = yes;
  BSS: load = RAM, type = bss, define = yes;
  VECTORS: load = ROM, type = ro, start = $FFFC;
}

SYMBOLS {
  __STACKSTART__ : type = weak, value = $01FF;
  __CONSTRUCTOR_COUNT__ : type = weak, value = 0;
  __CONSTRUCTOR_TABLE__ : type = weak, value = 0;
  __DESTRUCTOR_COUNT__  : type = weak, value = 0;
  __DESTRUCTOR_TABLE__  : type = weak, value = 0;
}